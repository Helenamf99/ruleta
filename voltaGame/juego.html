<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volta! - El Juego</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="imagenes/video.mp4" type="video/mp4">
        Tu navegador no soporta videos como fondo.
    </video>

    <div class="game-container">
        <div class="game-container">
            <div class="hud">
                <div>Tiempo: <span id="game-clock">00:00</span></div>
                <div>Aciertos: <span id="score-correct" style="color: #00ff87;">0</span></div>
                <div>Fallos: <span id="score-incorrect" style="color: #fe0851;">0</span></div>
            </div>

            <div class="rosco-container" id="rosco"></div>
        </div>

        <div id="countdown-screen">3</div>

        <div id="modal-sistema" class="game-modal-overlay">
            <div class="game-modal-content">
                <div id="sistema-dinamico"></div>
            </div>
        </div>

        <div id="modal-ruleta" class="game-modal-overlay">
            <div class="game-modal-content modal-ruleta-layout">
                <h3>Categoría para la letra <span id="ruleta-letra-titulo">A</span></h3>

                <div class="ruleta-container">
                    <div id="ruleta-neon" class="ruleta-disco">
                        <div class="sector" data-cat="GEOGRAFÍA"></div>
                        <div class="sector" data-cat="INFORMÁTICA"></div>
                        <div class="sector" data-cat="HISTORIA"></div>
                        <div class="sector" data-cat="MÚSICA"></div>
                        <div class="sector" data-cat="ENTRETENIMIENTO"></div>
                        <div class="sector" data-cat="DEPORTES"></div>
                        <div class="sector" data-cat="COMODIN_MAS" style="--sector-color: #fe0851;">
                        </div>
                        <div class="sector" data-cat="COMODIN_MENOS" style="--sector-color: #00ff87;">
                        </div>
                    </div>
                    <div class="ruleta-flecha">▲</div>
                </div>

                <button id="btn-girar-ruleta" class="btn-game-neon">Girar Ruleta</button>
            </div>
        </div>

        <div id="modal-pregunta" class="game-modal-overlay">
            <div class="game-modal-content">
                <div id="pregunta-dinamica"></div>
            </div>
        </div>
<audio id="sonidoCorrecto" src="../frontend/audio/correct.wav"></audio>
<audio id="sonidoError" src="../frontend/audio/bad.mp3"></audio>
<audio id="sonidoRuleta" src="../frontend/audio/roulette.mp3"></audio>
<audio id="sonidoUnknown" src="../frontend/audio/unknown.wav"></audio>
        <script src="juego.js"></script>

</body>

</html>
